name: aio_studio
description: "AIO Studio - 跨平台 AGI 项目与资产管理工具"
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  fluent_ui: ^4.14.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  dio: ^5.7.0
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.0
  window_manager: ^0.5.1
  flutter_acrylic: ^1.1.4
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  uuid: ^4.5.0
  intl: ^0.20.2
  logger: ^2.5.0
  shared_preferences: ^2.3.0
  path: ^1.9.1
  desktop_drop: ^0.5.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.2.4
  image: ^4.5.3
  share_plus: ^10.1.4
  markdown_widget: ^2.3.2+6
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.29.0
  mocktail: ^1.0.0
  msix: ^3.16.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0
  # riverpod_generator/riverpod_lint 涓?drift_dev 鐨?analyzer 鐗堟湰鍐茬獊锛?  # 寰呬笂娓稿彂甯冨吋瀹圭増鏈悗鍚敤锛?  # riverpod_generator: ^4.0.3
  # riverpod_lint: ^3.1.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#0078D4"
  image: "assets/logo.png"
  android: true
  ios: true

msix_config:
  display_name: AIO Studio
  publisher_display_name: AIO Studio
  identity_name: com.aiostudio.app
  msix_version: 1.0.5.0
  logo_path: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/model_capabilities.json
